<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Character Card</title>
  <style>

    /* 
    Style this profile card using what we have learnt about font and boxes!

    1. Style the Card (Box Model)
    Set a fixed width (e.g., 250px–300px)
    Add:
    - padding inside the card
    - margin to center or space it on the page
    - border or box-shadow
    - Optional: rounded corners (border-radius)

    2. Work with Fonts
    Choose one font or multiple fonts

    Style:
    - Name → bigger + bold
    - Title → slightly smaller + lighter color
    - Description → normal readable text
    - Play with line-height, letter-spacing and text-transformation to decorate your text

    3. Improvement
    - Add space between elements using margin/padding
    - Make your card visually balanced and cool looking
    */
    
  </style>

</head>
<body>
<!-- This is a demo card -->
 <div class="card">
    <h2>Mr. Robot</h2>
    <!-- Feel free to add an image! -->
    <p class="title">Bug Hunter & Pizza Lover</p>
    <p class="description">
      Known for debugging mysterious errors at 2am while consuming unreasonable amounts of pizza.
    </p>
  </div>

</body>
</html>
